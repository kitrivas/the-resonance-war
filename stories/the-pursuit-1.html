<style>

.font-sizer { display: flex; align-items: center; gap: 0.4rem; }

#fontSlider { -webkit-appearance: none; appearance: none; width: 60px; height: 1px; background: var(--border); outline: none; cursor: pointer; }

#fontSlider::-moz-range-thumb { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-dim); border: none; cursor: pointer; }
.audio-player { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: color-mix(in srgb, var(--bg) 95%, transparent); backdrop-filter: blur(16px); border-top: 1px solid var(--border); padding: 0.8rem 2rem; transform: translateY(100%); transition: transform 0.4s ease, background 0.4s, border-color 0.4s; }

.progress-bar:hover .progress-fill { background: var(--accent); }
.progress-handle { position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--accent-dim); opacity: 0; transition: opacity 0.3s; }

.listen-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.body-audio-active { padding-bottom: 4rem; }
.story-header { padding: 10rem 2rem 4rem; max-width: 680px; margin: 0 auto; text-align: center; }
.story-header h1 { font-family: var(--serif); font-weight: 300; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-bright); margin-bottom: 0.8rem; }
.story-meta { font-family: var(--sans); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-dim); margin-bottom: 0.5rem; }
.story-tagline { font-family: var(--body-serif); font-style: italic; font-size: 1rem; color: var(--text-muted); }
.story-rule { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-dim), transparent); margin: 3rem auto; }
.story-body { max-width: 640px; margin: 0 auto; padding: 0 2rem 6rem; }
.story-body h2 { font-family: var(--serif); font-weight: 400; font-size: 1.4rem; color: var(--text-bright); margin: 3rem 0 1.5rem; letter-spacing: 0.04em; text-align: center; }
.story-body p { font-family: var(--body-serif); font-size: 1rem; line-height: 1.9; color: var(--text); margin-bottom: 1.3rem; text-indent: 1.5rem; }
.story-body p:first-of-type, .story-body h2 + p { text-indent: 0; }
.story-body p em { font-style: italic; }
.story-break { max-width: 120px; margin: 4rem auto; height: 1px; background: linear-gradient(90deg, transparent, var(--accent-dim), transparent); }
.story-nav { max-width: 640px; margin: 0 auto; padding: 0 2rem 4rem; display: flex; justify-content: space-between; align-items: center; }
.story-nav a { font-family: var(--sans); font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-dim); text-decoration: none; transition: color 0.3s; }
.story-nav a:hover { color: var(--accent-soft); }
footer { border-top: 1px solid var(--border); padding: 3rem 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
footer span { font-family: var(--sans); font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-muted); }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-family: var(--sans); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--text-muted); text-decoration: none; transition: color 0.3s; }
.footer-links a:hover { color: var(--accent-soft); }
@media (max-width: 640px) {

  .audio-player { padding: 0.6rem 1.2rem; } .player-speed { display: none; } .story-nav { padding: 0 1.5rem 4rem; }
}

<script>
var nav=document.getElementById('nav');window.addEventListener('scroll',function(){nav.classList.toggle('scrolled',window.scrollY>60)});
var toggle=document.getElementById('themeToggle'),html=document.documentElement;function getSystemTheme(){return window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'}function applyTheme(t){html.setAttribute('data-theme',t);toggle.textContent=t==='dark'?'Light':'Dark'}var currentTheme=getSystemTheme();applyTheme(currentTheme);var manualOverride=false;window.matchMedia('(prefers-color-scheme: light)').addEventListener('change',function(e){if(!manualOverride){currentTheme=e.matches?'light':'dark';applyTheme(currentTheme)}});toggle.addEventListener('click',function(){manualOverride=true;currentTheme=currentTheme==='dark'?'light':'dark';applyTheme(currentTheme)});
document.getElementById('fontSlider').addEventListener('input',function(e){document.documentElement.style.fontSize=e.target.value+'px'});
var audioPlayer=document.getElementById('audioPlayer'),listenBtn=document.getElementById('listenBtn'),playPause=document.getElementById('playPause'),skipBack=document.getElementById('skipBack'),skipFwd=document.getElementById('skipFwd'),progressBar=document.getElementById('progressBar'),progressFill=document.getElementById('progressFill'),currentTimeEl=document.getElementById('currentTime'),totalTimeEl=document.getElementById('totalTime'),speedBtn=document.getElementById('speedBtn'),playerClose=document.getElementById('playerClose');
var audio=new Audio('audio/the-pursuit-1.mp3'),isPlaying=false,speeds=[0.75,1,1.25,1.5,2],speedIndex=1;
function formatTime(s){if(isNaN(s))return'0:00';var m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec}
listenBtn.addEventListener('click',function(){audioPlayer.classList.add('visible');document.body.classList.add('body-audio-active');audio.play();isPlaying=true;playPause.innerHTML='&#10074;&#10074;'});
playPause.addEventListener('click',function(){if(isPlaying){audio.pause();playPause.innerHTML='&#9654;'}else{audio.play();playPause.innerHTML='&#10074;&#10074;'}isPlaying=!isPlaying});
skipBack.addEventListener('click',function(){audio.currentTime=Math.max(0,audio.currentTime-15)});
skipFwd.addEventListener('click',function(){audio.currentTime=Math.min(audio.duration,audio.currentTime+15)});
speedBtn.addEventListener('click',function(){speedIndex=(speedIndex+1)%speeds.length;audio.playbackRate=speeds[speedIndex];speedBtn.textContent=speeds[speedIndex]+'\u00d7'});
audio.addEventListener('loadedmetadata',function(){totalTimeEl.textContent=formatTime(audio.duration)});
audio.addEventListener('timeupdate',function(){var pct=(audio.currentTime/audio.duration)*100;progressFill.style.width=pct+'%';currentTimeEl.textContent=formatTime(audio.currentTime)});
audio.addEventListener('ended',function(){isPlaying=false;playPause.innerHTML='&#9654;';progressFill.style.width='0%'});
progressBar.addEventListener('click',function(e){var rect=progressBar.getBoundingClientRect();var pct=(e.clientX-rect.left)/rect.width;audio.currentTime=pct*audio.duration});
playerClose.addEventListener('click',function(){audio.pause();isPlaying=false;playPause.innerHTML='&#9654;';audioPlayer.classList.remove('visible');document.body.classList.remove('body-audio-active')});
</script>
